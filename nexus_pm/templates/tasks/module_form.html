{% extends 'base.html' %}
{% block title %}{{ title }} — {{ project.name }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}
    <a href="{% url 'tasks:module_list' project.pk %}" class="btn btn-secondary btn-sm">Cancel</a>
{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="font-family:'Space Grotesk',sans-serif; margin-bottom: 20px;">{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
            <a href="{% url 'tasks:module_list' project.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
