<div class="tree-category-node" style="margin-left: {{ depth|multiply:20 }}px;">
    <div class="folder-header" style="display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s;" onclick="toggleReleaseFolder(this)">
        <i class="fas fa-chevron-right chevron-icon" style="font-size: 10px; color: var(--text-muted); transition: transform 0.2s;"></i>
        <i class="fas fa-folder" style="color: var(--accent); opacity: 0.8; font-size: 14px;"></i>
        <span style="font-size: 13px; font-weight: 600; color: var(--text-primary);">{{ category.name }}</span>
    </div>
    
    <div class="folder-content" style="display: none; margin-top: 2px;">
        {% for subcat in category.children.all|dictsort:"name" %}
            {% include 'tasks/release_file_tree_node.html' with category=subcat depth=depth|add:1 %}
        {% endfor %}
        
        {% for file in category.files.all|dictsort:"original_name" %}
            {% if not file.task %}
            <label class="tree-selection-item" style="display: flex; align-items: center; gap: 10px; padding: 6px 10px; margin-left: {{ depth|add:1|multiply:20|add:20 }}px; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-bottom: 2px;">
                <input type="checkbox" name="selected_files" value="{{ file.pk }}" {% if file in form.selected_files.initial %}checked{% endif %} style="margin: 0;">
                <i class="fas {{ file.icon_class }}" style="color: {{ file.icon_color }}; width: 16px; text-align: center; font-size: 14px;"></i>
                <span style="font-size: 13px; color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ file.display_name }}</span>
                <span style="font-size: 10px; color: var(--text-muted);">{{ file.file_size_display }}</span>
            </label>
            {% endif %}
        {% endfor %}
    </div>
</div>
