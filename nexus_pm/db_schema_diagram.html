<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Schema Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0d14;
    --panel: #111520;
    --border: #1e2535;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --accent6: #ec4899;
    --accent7: #06b6d4;
    --text: #e2e8f0;
    --muted: #64748b;
    --pk: #fbbf24;
    --fk: #34d399;
    --line: rgba(59,130,246,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 14px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stats {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .stat { color: var(--muted); }
  .stat span { color: var(--accent); font-weight: 600; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 6px 14px;
    background: var(--border);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--accent); border-color: var(--accent); }

  .filter-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.6;
  }

  .filter-tag.active { opacity: 1; }
  .filter-tag[data-group="accounts"] { background: rgba(59,130,246,0.15); border-color: #3b82f6; color: #3b82f6; }
  .filter-tag[data-group="tasks"] { background: rgba(139,92,246,0.15); border-color: #8b5cf6; color: #8b5cf6; }
  .filter-tag[data-group="inventory"] { background: rgba(16,185,129,0.15); border-color: #10b981; color: #10b981; }
  .filter-tag[data-group="products"] { background: rgba(245,158,11,0.15); border-color: #f59e0b; color: #f59e0b; }
  .filter-tag[data-group="files"] { background: rgba(236,72,153,0.15); border-color: #ec4899; color: #ec4899; }
  .filter-tag[data-group="finance"] { background: rgba(6,182,212,0.15); border-color: #06b6d4; color: #06b6d4; }
  .filter-tag[data-group="auth"] { background: rgba(239,68,68,0.15); border-color: #ef4444; color: #ef4444; }
  .filter-tag[data-group="django"] { background: rgba(100,116,139,0.15); border-color: #64748b; color: #64748b; }
  .filter-tag[data-group="stock"] { background: rgba(251,191,36,0.15); border-color: #fbbf24; color: #fbbf24; }
  .filter-tag[data-group="procurement"] { background: rgba(248,113,113,0.15); border-color: #f87171; color: #f87171; }
  .filter-tag[data-group="audit"] { background: rgba(167,139,250,0.15); border-color: #a78bfa; color: #a78bfa; }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: grab;
  }

  #canvas.dragging { cursor: grabbing; }

  svg#connections {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
  }

  .table-card {
    position: absolute;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    width: 240px;
    font-family: 'JetBrains Mono', monospace;
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: move;
    user-select: none;
  }

  .table-card:hover {
    box-shadow: 0 0 0 1px rgba(59,130,246,0.4), 0 8px 32px rgba(0,0,0,0.5);
    z-index: 50;
  }

  .table-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.3), 0 8px 32px rgba(0,0,0,0.6);
    z-index: 60;
  }

  .table-card.dimmed { opacity: 0.2; }

  .card-header {
    padding: 8px 12px;
    border-radius: 8px 8px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header .table-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .row-count {
    font-size: 9px;
    opacity: 0.6;
    background: rgba(0,0,0,0.3);
    padding: 2px 5px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .card-body { padding: 4px 0; }

  .col-row {
    padding: 3px 12px;
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-top: 1px solid rgba(255,255,255,0.03);
  }

  .col-badge {
    font-size: 8px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }

  .col-badge.pk { background: rgba(251,191,36,0.2); color: var(--pk); }
  .col-badge.fk { background: rgba(52,211,153,0.2); color: var(--fk); }
  .col-badge.nn { background: rgba(100,116,139,0.1); color: var(--muted); }

  .col-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #cbd5e1;
  }

  .col-name.pk-col { color: var(--pk); }
  .col-name.fk-col { color: var(--fk); }

  .col-type {
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .more-cols {
    padding: 3px 12px;
    font-size: 9px;
    color: var(--muted);
    border-top: 1px solid rgba(255,255,255,0.03);
  }

  .tooltip {
    position: fixed;
    background: rgba(17,21,32,0.97);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    z-index: 9999;
    pointer-events: none;
    min-width: 200px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }

  .tooltip.show { display: block; }
  .tooltip h3 { font-size: 12px; color: var(--accent); margin-bottom: 8px; font-family: 'Syne', sans-serif; }
  .tooltip .t-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .tooltip .t-key { color: var(--muted); }
  .tooltip .t-val { color: var(--text); }

  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 10;
  }

  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-line { width: 20px; height: 2px; }

  .minimap {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(17,21,32,0.9);
    border: 1px solid var(--border);
    border-radius: 6px;
    z-index: 10;
    overflow: hidden;
  }

  #zoom-level {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    z-index: 10;
  }

  .search-box {
    padding: 5px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 180px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⬡ DB SCHEMA EXPLORER</h1>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="stats">
      <div class="stat">Tables <span id="s-tables">0</span></div>
      <div class="stat">Relations <span id="s-rels">0</span></div>
      <div class="stat">Rows <span id="s-rows">0</span></div>
    </div>
    <div class="controls">
      <input class="search-box" id="search" placeholder="Search tables..." />
      <button class="btn" onclick="resetView()">Reset View</button>
      <button class="btn" onclick="autoLayout()">Auto Layout</button>
    </div>
  </header>

  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="connections"></svg>
    <div id="canvas"></div>
    <div id="zoom-level">100%</div>

    <div class="legend">
      <div style="font-weight:700; margin-bottom:8px; font-family:'Syne',sans-serif; font-size:11px; color:#94a3b8;">LEGEND</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Primary Key</div>
      <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Foreign Key</div>
      <div class="legend-item"><div class="legend-line" style="background:rgba(59,130,246,0.7)"></div> FK Relation</div>
      <div class="legend-item"><div class="legend-line" style="background:rgba(139,92,246,0.5); border-top: 2px dashed #8b5cf6; height:0"></div> Self Ref</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

const GROUP_COLORS = {
  accounts: '#3b82f6', tasks: '#8b5cf6', inventory: '#10b981',
  products: '#f59e0b', files: '#ec4899', finance: '#06b6d4',
  auth: '#ef4444', django: '#64748b', stock: '#fbbf24',
  procurement: '#f87171', audit: '#a78bfa', sqlite: '#94a3b8'
};

function getGroup(name) {
  const prefix = name.split('_')[0];
  return GROUP_COLORS[prefix] ? prefix : 'other';
}

function getColor(name) {
  const g = getGroup(name);
  return GROUP_COLORS[g] || '#64748b';
}

// State
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStart = { x: 0, y: 0 };
let cards = {}; // tableName -> {el, x, y, w, h}
let draggingCard = null, dragOffset = { x: 0, y: 0 };
let activeGroups = new Set(Object.keys(GROUP_COLORS));
let highlightedTable = null;

const canvas = document.getElementById('canvas');
const svgEl = document.getElementById('connections');
const wrap = document.getElementById('canvas-wrap');
const tooltip = document.getElementById('tooltip');

// Compute stats
let totalRows = Object.values(SCHEMA).reduce((a, t) => a + t.row_count, 0);
let totalRels = Object.values(SCHEMA).reduce((a, t) => a + t.foreign_keys.length, 0);
document.getElementById('s-tables').textContent = Object.keys(SCHEMA).length;
document.getElementById('s-rels').textContent = totalRels;
document.getElementById('s-rows').textContent = totalRows.toLocaleString();

// Build filter bar
const filterBar = document.getElementById('filter-bar');
Object.keys(GROUP_COLORS).forEach(g => {
  const t = document.createElement('div');
  t.className = 'filter-tag active';
  t.dataset.group = g;
  t.textContent = g;
  t.onclick = () => toggleGroup(g, t);
  filterBar.appendChild(t);
});

function toggleGroup(g, el) {
  if (activeGroups.has(g)) { activeGroups.delete(g); el.classList.remove('active'); }
  else { activeGroups.add(g); el.classList.add('active'); }
  filterCards();
  drawConnections();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  Object.entries(cards).forEach(([name, c]) => {
    const grp = getGroup(name);
    const visible = activeGroups.has(grp) && (!q || name.includes(q));
    c.el.style.display = visible ? '' : 'none';
  });
}

document.getElementById('search').addEventListener('input', () => {
  filterCards();
  drawConnections();
});

// Card height estimation
function cardHeight(table) {
  const cols = SCHEMA[table].columns;
  const shown = Math.min(cols.length, 8);
  return 32 + shown * 20 + (cols.length > 8 ? 16 : 0) + 8;
}

// Layout positions
function autoLayout() {
  const groups = {};
  Object.keys(SCHEMA).forEach(t => {
    const g = getGroup(t);
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });

  const groupList = Object.entries(groups);
  const COLS = 4;
  const GAP_X = 280, GAP_Y = 40;
  let gCol = 0, gRow = 0;
  let baseX = 60, baseY = 60;
  let groupColHeight = [0,0,0,0];

  groupList.forEach(([grp, tables], gi) => {
    gCol = gi % COLS;
    const startX = baseX + gCol * GAP_X;
    let y = 60 + Math.floor(gi / COLS) * 600;
    tables.forEach((t, i) => {
      const x = startX;
      const h = cardHeight(t);
      if (cards[t]) {
        cards[t].x = x;
        cards[t].y = y;
        cards[t].el.style.left = x + 'px';
        cards[t].el.style.top = y + 'px';
      }
      y += h + GAP_Y;
    });
  });

  drawConnections();
}

// Build cards
function buildCard(tableName) {
  const tbl = SCHEMA[tableName];
  const color = getColor(tableName);
  const fkCols = new Set(tbl.foreign_keys.map(f => f.from));

  const card = document.createElement('div');
  card.className = 'table-card';
  card.id = 'card-' + tableName;

  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.style.background = color + '22';
  hdr.style.borderBottom = `1px solid ${color}44`;

  const dot = document.createElement('div');
  dot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0`;

  const nameEl = document.createElement('div');
  nameEl.className = 'table-name';
  nameEl.style.color = color;
  nameEl.textContent = tableName;

  const rowCount = document.createElement('div');
  rowCount.className = 'row-count';
  rowCount.textContent = tbl.row_count + 'r';

  hdr.append(dot, nameEl, rowCount);
  card.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'card-body';

  const maxShow = 8;
  tbl.columns.slice(0, maxShow).forEach(col => {
    const row = document.createElement('div');
    row.className = 'col-row';

    const badge = document.createElement('div');
    badge.className = 'col-badge';
    if (col.pk) { badge.textContent = 'PK'; badge.classList.add('pk'); }
    else if (fkCols.has(col.name)) { badge.textContent = 'FK'; badge.classList.add('fk'); }
    else { badge.textContent = col.notnull ? 'NN' : ''; badge.classList.add('nn'); }

    const colName = document.createElement('div');
    colName.className = 'col-name' + (col.pk ? ' pk-col' : fkCols.has(col.name) ? ' fk-col' : '');
    colName.textContent = col.name;

    const colType = document.createElement('div');
    colType.className = 'col-type';
    colType.textContent = col.type.replace('varchar', 'vc').replace('integer', 'int');

    row.append(badge, colName, colType);
    body.appendChild(row);
  });

  if (tbl.columns.length > maxShow) {
    const more = document.createElement('div');
    more.className = 'more-cols';
    more.textContent = `+${tbl.columns.length - maxShow} more columns`;
    body.appendChild(more);
  }

  card.appendChild(body);

  // Card hover: highlight connections
  card.addEventListener('mouseenter', () => highlightTable(tableName));
  card.addEventListener('mouseleave', () => clearHighlight());

  // Card click: tooltip with details
  card.addEventListener('click', (e) => {
    e.stopPropagation();
    showTooltip(tableName, e.clientX, e.clientY);
  });

  // Drag
  card.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    draggingCard = tableName;
    const c = cards[tableName];
    dragOffset.x = (e.clientX - panX) / zoom - c.x;
    dragOffset.y = (e.clientY - panY) / zoom - c.y;
    card.style.zIndex = 100;
    e.stopPropagation();
  });

  return card;
}

function highlightTable(name) {
  highlightedTable = name;
  const connected = new Set([name]);
  (SCHEMA[name]?.foreign_keys || []).forEach(fk => connected.add(fk.table));
  Object.entries(SCHEMA).forEach(([t, d]) => {
    d.foreign_keys.forEach(fk => { if (fk.table === name) connected.add(t); });
  });

  Object.keys(cards).forEach(t => {
    if (connected.has(t)) cards[t].el.classList.add('highlighted');
    else cards[t].el.classList.add('dimmed');
  });
  drawConnections(name);
}

function clearHighlight() {
  highlightedTable = null;
  Object.values(cards).forEach(c => {
    c.el.classList.remove('highlighted', 'dimmed');
  });
  drawConnections();
  hideTooltip();
}

function showTooltip(name, x, y) {
  const tbl = SCHEMA[name];
  const color = getColor(name);
  tooltip.innerHTML = `
    <h3 style="color:${color}">${name}</h3>
    <div class="t-row"><span class="t-key">Columns:</span><span class="t-val">${tbl.columns.length}</span></div>
    <div class="t-row"><span class="t-key">Rows:</span><span class="t-val">${tbl.row_count}</span></div>
    <div class="t-row"><span class="t-key">FK refs:</span><span class="t-val">${tbl.foreign_keys.length}</span></div>
    <div class="t-row"><span class="t-key">Group:</span><span class="t-val" style="color:${color}">${getGroup(name)}</span></div>
    ${tbl.foreign_keys.length ? '<div style="margin-top:8px;color:#94a3b8;font-size:9px;">REFERENCES</div>' + tbl.foreign_keys.map(fk => `<div class="t-row"><span class="t-key">${fk.from}</span><span class="t-val" style="color:#34d399">→ ${fk.table}.${fk.to}</span></div>`).join('') : ''}
  `;
  tooltip.style.left = Math.min(x + 12, window.innerWidth - 340) + 'px';
  tooltip.style.top = Math.min(y + 12, window.innerHeight - 200) + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() { tooltip.classList.remove('show'); }

// SVG connections
function getCardCenter(name) {
  const c = cards[name];
  if (!c) return null;
  const el = c.el;
  return {
    x: c.x * zoom + panX,
    y: c.y * zoom + panY,
    w: el.offsetWidth * zoom,
    h: el.offsetHeight * zoom
  };
}

function drawConnections(highlight = null) {
  svgEl.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  ['fk', 'fk-dim', 'fk-hi'].forEach(id => {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'arrow-' + id);
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '8');
    marker.setAttribute('refX', '6');
    marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M0,0 L0,6 L8,3 z');
    path.setAttribute('fill', id === 'fk-hi' ? '#3b82f6' : id === 'fk' ? 'rgba(59,130,246,0.4)' : 'rgba(59,130,246,0.1)');
    marker.appendChild(path);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  Object.entries(SCHEMA).forEach(([fromTable, tbl]) => {
    tbl.foreign_keys.forEach(fk => {
      const toTable = fk.table;
      if (fromTable === toTable) return; // skip self-refs for now
      const fromC = getCardCenter(fromTable);
      const toC = getCardCenter(toTable);
      if (!fromC || !toC) return;

      const fromEl = cards[fromTable]?.el;
      const toEl = cards[toTable]?.el;
      if (!fromEl || !toEl) return;
      if (fromEl.style.display === 'none' || toEl.style.display === 'none') return;

      const isHighlighted = highlight && (fromTable === highlight || toTable === highlight);
      const isDimmed = highlight && !isHighlighted;

      // Connect right/left edges
      const fx = fromC.x + fromC.w;
      const fy = fromC.y + fromC.h / 2;
      const tx = toC.x;
      const ty = toC.y + toC.h / 2;

      const dx = Math.abs(tx - fx);
      const cx1 = fx + Math.min(dx * 0.5, 80);
      const cx2 = tx - Math.min(dx * 0.5, 80);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${fx},${fy} C${cx1},${fy} ${cx2},${ty} ${tx},${ty}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', isHighlighted ? '#3b82f6' : isDimmed ? 'rgba(59,130,246,0.07)' : 'rgba(59,130,246,0.25)');
      path.setAttribute('stroke-width', isHighlighted ? '2' : '1');
      path.setAttribute('marker-end', `url(#arrow-${isHighlighted ? 'fk-hi' : isDimmed ? 'fk-dim' : 'fk'})`);
      svgEl.appendChild(path);
    });
  });
}

// Pan & zoom
wrap.addEventListener('mousedown', (e) => {
  if (e.target === wrap || e.target === svgEl || e.target === canvas) {
    isPanning = true;
    panStart.x = e.clientX - panX;
    panStart.y = e.clientY - panY;
    canvas.classList.add('dragging');
    svgEl.classList.add('dragging');
  }
});

window.addEventListener('mousemove', (e) => {
  if (draggingCard) {
    const name = draggingCard;
    const x = (e.clientX - panX) / zoom - dragOffset.x;
    const y = (e.clientY - panY) / zoom - dragOffset.y;
    cards[name].x = x;
    cards[name].y = y;
    cards[name].el.style.left = x + 'px';
    cards[name].el.style.top = y + 'px';
    drawConnections(highlightedTable);
  } else if (isPanning) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyTransform();
    drawConnections(highlightedTable);
  }
});

window.addEventListener('mouseup', (e) => {
  if (draggingCard) {
    cards[draggingCard].el.style.zIndex = '';
    draggingCard = null;
  }
  isPanning = false;
  canvas.classList.remove('dragging');
});

wrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * delta;
  panY = my - (my - panY) * delta;
  zoom = Math.max(0.2, Math.min(3, zoom * delta));
  applyTransform();
  drawConnections(highlightedTable);
}, { passive: false });

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  canvas.style.transformOrigin = '0 0';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
}

function resetView() {
  zoom = 0.65; panX = 40; panY = 40;
  applyTransform();
  drawConnections();
}

// Initial layout positions (clustered by group)
const LAYOUT = {
  accounts: { col: 0, row: 0 },
  auth: { col: 1, row: 0 },
  django: { col: 2, row: 0 },
  tasks: { col: 3, row: 0 },
  files: { col: 4, row: 0 },
  finance: { col: 5, row: 0 },
  products: { col: 0, row: 1 },
  inventory: { col: 1, row: 1 },
  stock: { col: 2, row: 1 },
  procurement: { col: 3, row: 1 },
  audit: { col: 4, row: 1 },
};

const CARD_W = 240;
const COL_GAP = 290;
const GROUP_OFFSETS = {};

// Initialize cards
Object.keys(SCHEMA).forEach(name => {
  const el = buildCard(name);
  canvas.appendChild(el);
  cards[name] = { el, x: 0, y: 0, w: CARD_W, h: cardHeight(name) };
});

// Do auto layout
autoLayout();
resetView();

// Draw initial connections after brief layout
setTimeout(() => {
  drawConnections();
}, 100);

// Click away to deselect
document.addEventListener('click', () => { if (!draggingCard) hideTooltip(); });
</script>
